name: Deploy to main

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e

            echo "=== Masuk ke direktori app ==="
            cd ~/so-dashboard

            echo "=== Mengambil pembaharuan list branch dari GitHub ==="
            git fetch origin

            echo "=== Pull kode terbaru dari branch main ==="
            # Menggunakan flag -f atau set upstream jika sebelumnya server berada di branch lain
            git checkout main || git checkout -b main origin/main
            git pull origin main

            echo "=== Install dependencies ==="
            npm ci 

            echo "=== Build Next.js ==="
            # Ditambahkan limit memory 2GB biar server 4GB RAM kamu aman saat build
            npm run build

            echo "=== Restart PM2 ==="
            pm2 restart so-dashboard --update-env

            echo "=== Save PM2 state ==="
            pm2 save

            echo "=== Deploy selesai ==="